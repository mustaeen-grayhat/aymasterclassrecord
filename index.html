/* ── FIREBASE HELPERS ───────────────────────────── */
function arrToObj(arr) {
  if (!arr || !arr.length) return {};
  const obj = {};
  arr.forEach(item => { obj[item.id] = item; });
  return obj;
}
function objToArr(obj) {
  if (!obj) return [];
  return Object.values(obj);
}
function fbSet(path, arr) {
  return db.ref("ielts/" + path).set(arrToObj(arr));
}
function fbRemoveStudent(path, id) {
  return db.ref("ielts/" + path + "/" + id).remove();
}
function fbListen(path, callback) {
  const ref = db.ref("ielts/" + path);
  ref.on("value", snap => {
    const val = snap.val();
    callback(objToArr(val));
  });
  return () => ref.off();
}

/* ── CSV EXPORT ─────────────────────────────────── */
const exportCSV = (rows, filename, type) => {
  const isO = type === "online" || type === "pastOnline";
  const hdrs = isO
    ? ["Name","Country","Date Joined","IELTS Type","Band Score","Contact","Notes"]
    : ["Name","ID Card","Date Joined","IELTS Type","Band Score","Contact","Notes"];
  const lines = [hdrs.join(","), ...rows.map(r =>
    (isO ? [r.name,r.country,r.dateJoined,r.ieltsType,r.bandScore,r.contact,r.notes||""]
          : [r.name,r.idCard,r.dateJoined,r.ieltsType,r.bandScore,r.contact,r.notes||""]
    ).map(v => `"${String(v).replace(/"/g,'""')}"`).join(",")
  )];
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([lines.join("\n")], {type:"text/csv"}));
  a.download = filename; a.click();
};

/* ── TOAST ──────────────────────────────────────── */
function Toast({toast, onDone}) {
  useEffect(() => { const t = setTimeout(onDone, 3200); return () => clearTimeout(t); }, []);
  if (!toast) return null;
  const bg = toast.type==="success" ? "#16a34a" : toast.type==="error" ? "#dc2626" : "#2563eb";
  return (
    <div style={{position:"fixed",bottom:24,right:24,zIndex:9999,background:bg,color:"white",
      padding:"12px 20px",borderRadius:16,boxShadow:"0 8px 32px rgba(0,0,0,0.25)",
      fontWeight:600,fontSize:14,display:"flex",alignItems:"center",gap:8,maxWidth:360}}>
      {toast.type==="success"?"✓":toast.type==="error"?"✕":"ℹ"} {toast.message}
    </div>
  );
}

/* ── STUDENT FORM ───────────────────────────────── */
function StudentForm({type, student, onSave, onClose}) {

    dateJoined:new Date().toISOString().slice(0,10),
    ieltsType:"Academic", bandScore:7, contact:"", notes:""
  });
  const [errs, setErrs] = useState({});
  const set = (k,v) => setF(p => ({...p,[k]:v}));
  const validate = () => {
    const e={};
    if (!f.name?.trim()) e.name="Name is required";
    if (isO && !f.country) e.country="Country required";
    if (!isO && !f.idCard?.trim()) e.idCard="ID Card required";
    if (!f.dateJoined) e.dateJoined="Date required";
    if (!f.contact?.trim()) e.contact="Contact required";
    setErrs(e); return Object.keys(e).length===0;
  };
  const inp = (label,k,placeholder="",inputType="text") => (
    <div style={{marginBottom:14}}>
      <label style={{display:"block",fontSize:11,fontWeight:700,color:"#666",marginBottom:4,
        textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</label>
      <input type={inputType} value={f[k]||""} onChange={e=>set(k,e.target.value)} placeholder={placeholder}
        style={{width:"100%",padding:"10px 13px",borderRadius:10,fontSize:13,outline:"none",background:"white",
          border:`2px solid ${errs[k]?"#ef4444":"#e0d8cc"}`}}/>
      {errs[k]&&<p style={{color:"#ef4444",fontSize:11,margin:"3px 0 0"}}>{errs[k]}</p>}
    </div>
  );
  return (
    <div style={{position:"fixed",inset:0,zIndex:7000,background:"rgba(0,0,0,0.55)",
      display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:CREAM,borderRadius:22,width:"100%",maxWidth:500,
        maxHeight:"92vh",overflow:"auto",boxShadow:"0 24px 80px rgba(0,0,0,0.35)"}}>

            {student?"Edit Student":"Add New Student"}

        </div>
        <div style={{padding:24}}>
          {inp("Full Name","name","Enter full name")}
          {isO ? (
            <div style={{marginBottom:14}}>
              <label style={{display:"block",fontSize:11,fontWeight:700,color:"#666",marginBottom:4,
                textTransform:"uppercase",letterSpacing:"0.06em"}}>Country</label>
              <select value={f.country||"Pakistan"} onChange={e=>set("country",e.target.value)}
                style={{width:"100%",padding:"10px 13px",borderRadius:10,border:"2px solid #e0d8cc",
                  fontSize:13,background:"white",outline:"none"}}>

              </select>
            </div>
          ) : inp("ID Card Number","idCard","e.g. 35202-1234567-1")}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
            <div>
              <label style={{display:"block",fontSize:11,fontWeight:700,color:"#666",marginBottom:4,
                textTransform:"uppercase",letterSpacing:"0.06em"}}>Date of Joining</label>
              <input type="date" value={f.dateJoined||""} onChange={e=>set("dateJoined",e.target.value)}
                style={{width:"100%",padding:"10px 13px",borderRadius:10,fontSize:13,outline:"none",
                  background:"white",border:`2px solid ${errs.dateJoined?"#ef4444":"#e0d8cc"}`}}/>
            </div>
            <div>

/* ── STUDENT SECTION ────────────────────────────── */
function StudentSection({title, icon, type, students, setPastStudents, pastStudents, showToast}) {
  const [search,setSearch]=useState(""); const [fType,setFType]=useState("All");
  const [fBand,setFBand]=useState("All"); const [sortK,setSortK]=useState("dateJoined");
  const [sortD,setSortD]=useState("desc"); const [showForm,setShowForm]=useState(false);
  const [editing,setEditing]=useState(null); const [viewing,setViewing]=useState(null);
  const [confirm,setConfirm]=useState(null);

  const filtered = useMemo(() => {
    let r = [...students];
    if (search) {
      const s = search.toLowerCase();
      r = r.filter(x => x.name.toLowerCase().includes(s) ||
        (x.country||"").toLowerCase().includes(s) ||
        (x.idCard||"").toLowerCase().includes(s) ||
        x.contact.includes(s));
    }
    if (fType!=="All") r=r.filter(x=>x.ieltsType===fType);
    if (fBand!=="All") r=r.filter(x=>x.bandScore===parseFloat(fBand));
    r.sort((a,b)=>{
      const va=a[sortK],vb=b[sortK];
      const c=typeof va==="string"?va.localeCompare(vb):va-vb;
      return sortD==="asc"?c:-c;
    });
    return r;
  },[students,search,fType,fBand,sortK,sortD]);

  const save = async s => {
    let updated;
    if (editing) updated=students.map(x=>x.id===s.id?s:x);
    else updated=[s,...students];

    try {
      await fbSet(type, updated);
      showToast(editing ? "Student updated!" : "Student added successfully!", "success");
      setShowForm(false); setEditing(null);
    } catch (error) {
      console.error(error);
      showToast("Save failed. Check Firebase rules.", "error");
    }
  };

  const del = s => setConfirm({
    msg:`Permanently delete ${s.name}?`,
    onYes: async () => {
      try {
        await fbRemoveStudent(type, s.id);
        setViewing(null); setConfirm(null); showToast("Student deleted.","success");
      } catch (error) {
        console.error(error);
        showToast("Delete failed. Check Firebase rules.", "error");
      }
    }
  });

  const move = s => setConfirm({
    msg:`Move ${s.name} to Past Students?`,
    onYes: async () => {
      try {
        await fbRemoveStudent(type, s.id);
        await db.ref("ielts/" + (type==="online"?"pastOnline":"pastPhysical") + "/" + s.id).set(s);
        setViewing(null); setConfirm(null); showToast("Moved to Past Students.","success");
      } catch (error) {
        console.error(error);
        showToast("Move failed. Check Firebase rules.", "error");
      }
    }
  });

  const SS = {padding:"8px 12px",borderRadius:10,border:"2px solid #e0d8cc",fontSize:12,background:"white",outline:"none"};
  return (
    <div>
      <div style={{display:"flex",flexWrap:"wrap",alignItems:"center",justifyContent:"space-between",gap:12,marginBottom:24}}>
        <div>
          <h2 style={{fontSize:22,fontWeight:800,color:DARK,margin:"0 0 4px"}}>{icon} {title}</h2>
          <p style={{color:"#999",fontSize:13,margin:0}}>{students.length} students total</p>
        </div>
        <button onClick={()=>{setEditing(null);setShowForm(true);}}
          style={{padding:"10px 22px",borderRadius:12,background:GOLD,color:"white",fontWeight:700,fontSize:13,border:"none"}}>
          + Add Student
        </button>
      </div>
      <div style={{background:"white",borderRadius:16,padding:14,marginBottom:12,
        display:"flex",flexWrap:"wrap",gap:10,alignItems:"center",boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder={type==="online"?"Search name, country, contact...":"Search name, ID card, contact..."}
          style={{flex:1,minWidth:180,padding:"8px 14px",borderRadius:10,border:"2px solid #e0d8cc",fontSize:12,outline:"none"}}/>
        <select value={fType} onChange={e=>setFType(e.target.value)} style={SS}>
          <option value="All">All Types</option><option>Academic</option><option>General</option>
        </select>
        <select value={fBand} onChange={e=>setFBand(e.target.value)} style={SS}>
          <option value="All">All Bands</option>
          {BANDS.map(b=><option key={b} value={b}>{b}</option>)}
        </select>
        <select value={sortK} onChange={e=>setSortK(e.target.value)} style={SS}>
          <option value="dateJoined">Sort: Date</option>
          <option value="name">Sort: Name</option>
          <option value="bandScore">Sort: Band</option>
        </select>
        <button onClick={()=>setSortD(d=>d==="asc"?"desc":"asc")} style={{...SS,padding:"8px 10px"}}>
          {sortD==="asc"?"↑ Asc":"↓ Desc"}
        </button>
        <button onClick={()=>exportCSV(students,`${type}-students.csv`,type)}
          style={{...SS,background:"#f5f0e8",color:"#666"}}>⬇ Export CSV</button>
      </div>
      <div style={{background:"white",borderRadius:16,overflow:"hidden",boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
        <StudentsTable students={filtered} type={type}
          onView={setViewing}
          onEdit={s=>{setEditing(s);setShowForm(true);setViewing(null);}}
          onDelete={del} onMovePast={move}/>
      </div>
      {showForm && <StudentForm type={type} student={editing} onSave={save} onClose={()=>{setShowForm(false);setEditing(null);}}/>}
      {viewing && <DetailModal s={viewing} type={type} onClose={()=>setViewing(null)}
        onEdit={()=>{setEditing(viewing);setShowForm(true);setViewing(null);}}
        onMovePast={()=>move(viewing)} onDelete={()=>del(viewing)}/>} 
      {confirm && <Confirm msg={confirm.msg} onYes={confirm.onYes} onNo={()=>setConfirm(null)}/>} 
    </div>
  );
}

/* ── PAST STUDENTS ──────────────────────────────── */
function PastStudents({pastOnline,setPastOnline,pastPhysical,setPastPhysical,setOnline,setPhysical,online,physical,showToast}) {
  const [tab,setTab]=useState("online"); const [search,setSearch]=useState("");
  const [page,setPage]=useState(1); const [perPage,setPerPage]=useState(25);
  const [confirm,setConfirm]=useState(null);
  const data = tab==="online" ? pastOnline : pastPhysical;
  const isO = tab==="online";

  const filtered = useMemo(() => {
    if (!search) return data;
    const s = search.toLowerCase();
    return data.filter(x=>x.name.toLowerCase().includes(s)||(x.country||"").toLowerCase().includes(s)||(x.idCard||"").toLowerCase().includes(s));
  },[data,search]);
  const pages = Math.max(1, Math.ceil(filtered.length/perPage));
  const paged = filtered.slice((page-1)*perPage, page*perPage);

  const restore = s => setConfirm({
    msg:`Restore ${s.name} to active students?`,
    onYes: async () => {
      try {
        const pastPath = isO ? "pastOnline" : "pastPhysical";
        const activePath = isO ? "online" : "physical";
        await fbRemoveStudent(pastPath, s.id);
        await db.ref("ielts/" + activePath + "/" + s.id).set(s);
        setConfirm(null); showToast("Student restored!","success");
      } catch (error) {
        console.error(error);
        showToast("Restore failed. Check Firebase rules.", "error");
      }
    }
  });

  const permDel = s => setConfirm({
    msg:`Permanently delete ${s.name}? This CANNOT be undone.`,
    onYes: async () => {
      try {
        await fbRemoveStudent(isO ? "pastOnline" : "pastPhysical", s.id);
        setConfirm(null); showToast("Permanently deleted.","success");
      } catch (error) {
        console.error(error);
        showToast("Delete failed. Check Firebase rules.", "error");
      }
    }
  });

  const SS = {padding:"8px 12px",borderRadius:10,border:"2px solid #e0d8cc",fontSize:12,background:"white",outline:"none"};
  return (
    <div>
      <div style={{marginBottom:24}}>
        <h2 style={{fontSize:22,fontWeight:800,color:DARK,margin:"0 0 4px"}}>📦 Past Students Archive</h2>
        <p style={{color:"#999",fontSize:13,margin:0}}>{pastOnline.length+pastPhysical.length} archived students total</p>
      </div>
      <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
        {["online","physical"].map(t=>(
          <button key={t} onClick={()=>{setTab(t);setPage(1);}}
            style={{padding:"9px 20px",borderRadius:12,fontWeight:700,fontSize:13,
              border:tab===t?"none":`2px solid #e0d8cc`,
              background:tab===t?GOLD:"white",color:tab===t?"white":"#666"}}>
            {t==="online"?"🌐 Past Online":"🏫 Past Physical"}
            <span style={{marginLeft:6,fontSize:11,opacity:.8}}>
              ({t==="online"?pastOnline.length:pastPhysical.length})
            </span>
          </button>
        ))}
      </div>
      <div style={{background:"white",borderRadius:16,padding:14,marginBottom:12,
        display:"flex",flexWrap:"wrap",gap:10,alignItems:"center",boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
        <input value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}}
          placeholder="Search archived students..."
          style={{flex:1,minWidth:160,padding:"8px 14px",borderRadius:10,border:"2px solid #e0d8cc",fontSize:12,outline:"none"}}/>
        <select value={perPage} onChange={e=>{setPerPage(+e.target.value);setPage(1);}} style={SS}>
          <option value={25}>25/page</option><option value={50}>50/page</option><option value={100}>100/page</option>
        </select>
        <button onClick={()=>exportCSV(data,`past-${tab}-students.csv`,isO?"pastOnline":"pastPhysical")}
          style={{...SS,background:"#f5f0e8",color:"#666"}}>⬇ Export CSV</button>
      </div>
      <div style={{background:"white",borderRadius:16,overflow:"hidden",boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
        {!paged.length ? (
          <div style={{textAlign:"center",padding:"64px 20px",color:"#bbb"}}>
            <div style={{fontSize:48,marginBottom:8}}>📦</div>
            <p style={{margin:0}}>No archived students found</p>
          </div>
        ) : (
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead>
                <tr style={{background:DARK}}>
                  {["Name",isO?"Country":"ID Card","Type","Band","Joined","Actions"].map((h,i,arr)=>(
                    <th key={h} style={{padding:"12px 14px",textAlign:"left",fontSize:10,textTransform:"uppercase",
                      letterSpacing:"0.08em",color:"#E8D5A3",
                      borderRadius:i===0?"12px 0 0 0":i===arr.length-1?"0 12px 0 0":0}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {paged.map((s,i)=>(
                  <tr key={s.id} style={{background:i%2===0?"white":"#fdf9f3",borderBottom:"1px solid #f3ede3"}}>
                    <td style={{padding:"12px 14px",fontWeight:700,color:DARK,fontSize:13}}>{s.name}</td>
                    <td style={{padding:"12px 14px",fontSize:13}}>
                      {isO?<>{FLAGS[s.country]||""} {s.country}</>
                          :<span style={{fontFamily:"monospace",fontSize:11,color:"#888"}}>{s.idCard}</span>}
                    </td>
                    <td style={{padding:"12px 14px"}}><TypeBadge t={s.ieltsType}/></td>
                    <td style={{padding:"12px 14px"}}><BandBadge s={s.bandScore}/></td>
                    <td style={{padding:"12px 14px",color:"#999",fontSize:11,whiteSpace:"nowrap"}}>{fmtDate(s.dateJoined)}</td>
                    <td style={{padding:"12px 14px"}}>
                      <button onClick={()=>restore(s)} style={{padding:"5px 11px",borderRadius:8,border:"none",
                        background:"#dcfce7",color:"#16a34a",fontWeight:600,fontSize:11,marginRight:6}}>↩ Restore</button>
                      <button onClick={()=>permDel(s)} style={{padding:"5px 11px",borderRadius:8,border:"none",
                        background:"#fee2e2",color:"#dc2626",fontWeight:600,fontSize:11}}>🗑 Delete</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
      {pages>1 && (
        <div style={{display:"flex",justifyContent:"center",gap:6,marginTop:16,flexWrap:"wrap"}}>
          <button onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={page===1}
            style={{padding:"6px 12px",borderRadius:8,border:"2px solid #e0d8cc",background:"white",opacity:page===1?.4:1}}>←</button>
          {Array.from({length:pages},(_,i)=>i+1)
            .filter(p=>p===1||p===pages||Math.abs(p-page)<=2)
            .reduce((acc,p,i,arr)=>{if(i>0&&arr[i-1]!==p-1) acc.push("…"); acc.push(p); return acc;},[])
            .map((p,i)=>typeof p==="string"
              ? <span key={i} style={{padding:"6px 4px",color:"#ccc"}}>…</span>
              : <button key={p} onClick={()=>setPage(p)}
                  style={{padding:"6px 12px",borderRadius:8,fontWeight:600,
                    border:p===page?"none":"2px solid #e0d8cc",
                    background:p===page?GOLD:"white",color:p===page?"white":"#555"}}>{p}</button>
            )}
          <button onClick={()=>setPage(p=>Math.min(pages,p+1))} disabled={page===pages}
            style={{padding:"6px 12px",borderRadius:8,border:"2px solid #e0d8cc",background:"white",opacity:page===pages?.4:1}}>→</button>
        </div>
      )}
      {confirm && <Confirm msg={confirm.msg} onYes={confirm.onYes} onNo={()=>setConfirm(null)}/>} 
    </div>
  );
}

      <div style={{background:"white",borderRadius:16,padding:22,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>

          </p>
          <button onClick={()=>setConfirm({msg:"Reset all data to demo? All current records will be permanently lost.",onYes:()=>{onReset();setConfirm(null);showToast("Reset to demo data.","success");}})}
            style={{padding:"11px 22px",borderRadius:12,border:"none",background:"#ef4444",color:"white",fontWeight:700,fontSize:13}}>
            Reset to Demo Data
          </button>
        </div>
        <div style={cardS}>
          <h3 style={{fontWeight:700,margin:"0 0 6px",color:DARK}}>ℹ️ About</h3>
          <p style={{color:"#777",fontSize:13,margin:"0 0 4px"}}>IELTS Student Manager — Firebase Edition</p>
          <p style={{color:GOLD,fontSize:13,fontWeight:700,margin:0}}>✦ Designed by Asad Yaqub</p>
        </div>
      </div>
      {confirm && <Confirm msg={confirm.msg} onYes={confirm.onYes} onNo={()=>setConfirm(null)}/>} 
    </div>
  );
}

/* ── MAIN APP ───────────────────────────────────── */
const NAVS = [
  {id:"dashboard", icon:"📊", label:"Dashboard"},
  {id:"online",    icon:"🌐", label:"Online Students"},
  {id:"physical",  icon:"🏫", label:"Physical Students"},
  {id:"past",      icon:"📦", label:"Past Students"},
  {id:"settings",  icon:"⚙️", label:"Settings"},
];

function App() {
  const [loggedIn, setLoggedIn]    = useState(false);
  const [view, setView]            = useState("dashboard");
  const [mobileOpen, setMO]        = useState(false);
  const [toast, setToast]          = useState(null);
  const [syncStatus, setSyncStatus]= useState("ing");
  const [loaded, setLoaded]        = useState(false);

  const [online,       setOnline]       = useState([]);
  const [physical,     setPhysical]     = useState([]);
  const [pastOnline,   setPastOnline]   = useState([]);
  const [pastPhysical, setPastPhysical] = useState([]);

  useEffect(() => {
    const resolved = {online:false,physical:false,pastOnline:false,pastPhysical:false};
    function checkLoaded() {
      if (Object.values(resolved).every(Boolean)) { setLoaded(true); setSyncStatus("on"); }
    }

    const off1 = fbListen("online", data => {
      setOnline(data || []);
      if(!resolved.online){resolved.online=true;checkLoaded();}
    });
    const off2 = fbListen("physical", data => {
      setPhysical(data || []);
      if(!resolved.physical){resolved.physical=true;checkLoaded();}
    });
    const off3 = fbListen("pastOnline", data => {
      setPastOnline(data || []);
      if(!resolved.pastOnline){resolved.pastOnline=true;checkLoaded();}
    });
    const off4 = fbListen("pastPhysical", data => {
      setPastPhysical(data || []);
      if(!resolved.pastPhysical){resolved.pastPhysical=true;checkLoaded();}
    });

    const connectedRef = db.ref(".info/connected");
    connectedRef.on("value", snap => {
      setSyncStatus(snap.val() ? "on" : "off");
    });

    return () => { off1(); off2(); off3(); off4(); connectedRef.off(); };
  }, []);

  const showToast = (message, type="success") => setToast({message, type});

  const reset = () => {
    fbSet("online", DEMO_ONLINE);
    fbSet("physical", DEMO_PHYSICAL);
    fbSet("pastOnline", DEMO_PAST_ONLINE);
    fbSet("pastPhysical", DEMO_PAST_PHYSICAL);
  };

  if (!loggedIn) return <Login onLogin={()=>setLoggedIn(true)}/>;

  if (!loaded) return (
    <div style={{minHeight:"100vh",background:DARK,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{color:GOLD,fontSize:44}}>◈</div>
      <p style={{color:"white",fontWeight:700,fontSize:16,margin:0}}>IELTS Student Manager</p>
      <p style={{color:"rgba(255,255,255,0.35)",fontSize:13,margin:0}}>Connecting to Firebase…</p>
    </div>
  );

  const counts = {online:online.length, physical:physical.length, past:pastOnline.length+pastPhysical.length};
  const syncColors = {"on":"#22c55e","off":"#ef4444","ing":"#f59e0b"};
  const syncLabels = {"on":"Synced","off":"Offline","ing":"Syncing…"};

  const renderView = () => {
    switch(view) {
      case "dashboard": return <Dashboard online={online} physical={physical} pastOnline={pastOnline} pastPhysical={pastPhysical}/>;
      case "online":    return <StudentSection title="Online Students" icon="🌐" type="online" students={online} setPastStudents={setPastOnline} pastStudents={pastOnline} showToast={showToast}/>;
      case "physical":  return <StudentSection title="Physical / In-Campus Students" icon="🏫" type="physical" students={physical} setPastStudents={setPastPhysical} pastStudents={pastPhysical} showToast={showToast}/>;
      case "past":      return <PastStudents pastOnline={pastOnline} setPastOnline={setPastOnline} pastPhysical={pastPhysical} setPastPhysical={setPastPhysical} setOnline={setOnline} setPhysical={setPhysical} online={online} physical={physical} showToast={showToast}/>;
      case "settings":  return <Settings onReset={reset} showToast={showToast} online={online} physical={physical} pastOnline={pastOnline} pastPhysical={pastPhysical}/>;
    }
  };

  const SideNav = () => (
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:DARK}}>
      <div style={{padding:"24px 20px",borderBottom:"1px solid #2a2a2a"}}>
        <h1 style={{color:"white",fontWeight:800,fontSize:17,lineHeight:1.35,margin:"0 0 6px"}}>
          IELTS Student<br/>Manager
        </h1>
        <span style={{color:GOLD,fontSize:11,fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase"}}>◈ Asad Yaqub</span>
      </div>
      <nav style={{flex:1,padding:"14px 12px",overflowY:"auto"}}>
        {NAVS.map(n=>(
          <button key={n.id} onClick={()=>{setView(n.id);setMO(false);}}
            style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"11px 14px",
              borderRadius:12,border:"none",marginBottom:4,fontWeight:600,fontSize:13,
              background:view===n.id?GOLD:"transparent",color:view===n.id?"white":"#aaa",
              textAlign:"left"}}>
            <span style={{fontSize:16}}>{n.icon}</span>
            <span style={{flex:1}}>{n.label}</span>
            {counts[n.id]!==undefined && (
              <span style={{fontSize:10,background:"rgba(255,255,255,0.18)",padding:"2px 8px",borderRadius:20}}>
                {counts[n.id]}
              </span>
            )}
          </button>
        ))}
      </nav>
      <div style={{padding:"14px 20px",borderTop:"1px solid #2a2a2a",textAlign:"center"}}>
        <p style={{color:GOLD,fontSize:11,fontWeight:700,margin:"0 0 2px"}}>✦ Asad Yaqub</p>
        <p style={{color:"#444",fontSize:10,margin:0}}>IELTS Student Manager</p>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:CREAM,display:"flex"}}>
      <div style={{width:240,position:"fixed",top:0,left:0,bottom:0,zIndex:100,display:"flex",flexDirection:"column"}}
        className="desktop-sidebar">
        <SideNav/>
      </div>
      {mobileOpen && (
        <div style={{position:"fixed",inset:0,zIndex:9000}}>
          <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.55)"}} onClick={()=>setMO(false)}/>
          <div style={{position:"absolute",top:0,left:0,bottom:0,width:240}}>
            <SideNav/>
          </div>
        </div>
      )}
      <div style={{marginLeft:240,flex:1,display:"flex",flexDirection:"column",minWidth:0}}
        className="main-content">
        <header style={{background:"white",borderBottom:"1px solid #EDE5D8",
          padding:"14px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",
          position:"sticky",top:0,zIndex:50,boxShadow:"0 1px 6px rgba(0,0,0,0.05)"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <button onClick={()=>setMO(true)} className="mobile-menu-btn"
              style={{display:"none",padding:"6px 8px",borderRadius:8,border:"none",
                background:"#f5f5f5",fontSize:16,lineHeight:1}}>☰</button>
            <span style={{fontWeight:600,color:"#888",fontSize:14}}>
              {NAVS.find(n=>n.id===view)?.icon} {NAVS.find(n=>n.id===view)?.label}
            </span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"#999",fontWeight:600}}>
              <span style={{width:7,height:7,borderRadius:"50%",background:syncColors[syncStatus],display:"inline-block",
                boxShadow:syncStatus==="on"?"0 0 6px #22c55e":"none"}}/>
              {syncLabels[syncStatus]}
            </div>
            <span style={{color:GOLD,fontWeight:700,fontSize:13,letterSpacing:"0.05em"}}>✦ Asad Yaqub</span>
            <button onClick={()=>setLoggedIn(false)}
              style={{padding:"7px 15px",borderRadius:10,border:"2px solid #e0d8cc",
                background:"white",color:"#666",fontWeight:600,fontSize:12}}>
              🔒 Lock
            </button>
          </div>
        </header>
        <main style={{flex:1,padding:"28px",overflowY:"auto"}}>
          {renderView()}
        </main>
      </div>
      {toast && <Toast toast={toast} onDone={()=>setToast(null)}/>} 
      <style>{`
        @media (max-width: 768px) {
          .desktop-sidebar { display: none !important; }
          .main-content { margin-left: 0 !important; }
          .mobile-menu-btn { display: flex !important; }
        }
        button:active { transform: scale(0.97); }
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
